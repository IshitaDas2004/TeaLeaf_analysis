<!DOCTYPE html>
<html>
<head>
    <title>TeaDiagnostix</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<nav class="navbar">
    <div class="logo">🌿 <span>TeaDiagnostix</span></div>
</nav>

<section class="hero">
    <h1>TeaDiagnostix</h1>
    <p>Advanced Tea Plant Disease Detection & Analysis</p>

    <button class="btn-primary" onclick="showUpload()">Analyze Leaf</button>
</section>

<!-- Hidden Upload Section -->
<section class="upload-section" id="uploadSection">
    <form id="uploadForm">
        <input type="file" id="fileInput" name="file" required>
        <br><br>
        <button type="submit" class="btn-primary">Predict</button>
    </form>

    <div id="result" class="result-box"></div>
</section>

<footer class="footer">
    TeaDiagnostix System – University Project Evaluation
</footer>

<script>
function showUpload() {
    document.getElementById("uploadSection").style.display = "block";
}

document.getElementById("uploadForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const fileInput = document.getElementById("fileInput");
    const formData = new FormData();
    formData.append("file", fileInput.files[0]);

    const response = await fetch("/predict", {
        method: "POST",
        body: formData
    });

    const data = await response.json();

    document.getElementById("result").innerHTML =
        `<h3>Prediction: ${data.prediction}</h3>
         <p>Confidence: ${data.confidence}%</p>`;
});
</script>

</body>
</html>
